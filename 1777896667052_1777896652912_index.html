Aqui está a calculadora em modo Full Screen, ocupando toda a tela com layout responsivo e adaptável a qualquer resolução:

```html
<!DOCTYPE html>
<html lang="pt">
<head>

  <style>
    * {
      margin: 0;

      user-select: none;

    /* ===== FULL SCREEN BASE ===== */

<body>

<div class="animated-bg"></div>
<div class="particles" id="particlesContainer"></div>

<div class="dashboard">
  <div class="calculator">
    <div class="calc-header">
      <span class="calc-title">⚡ PRO CALC • FULLSCREEN</span>
      <button class="history-btn" id="openHistoryBtn">📜 Histórico</button>
    </div>

    <input type="text" id="display" disabled placeholder="0">

    <div class="buttons">
      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="deleteLast()" class="function-btn">⌫</button>
      <button onclick="appendPercentage()" class="percent-btn">%</button>
      <button onclick="append('/')" class="operator">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('*')" class="operator">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('-')" class="operator">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('+')" class="operator">+</button>

      <button onclick="append('0')" style="grid-column: span 2;">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="calculate()" class="equal">=</button>
    </div>
  </div>
</div>

<!-- Modal Histórico -->
<div id="historyModal" class="modal-overlay">
  <div class="history-modal">
    <div class="modal-header">
      <h3>📋 Histórico</h3>
      <button class="close-modal" id="closeModalBtn">✕</button>
    </div>
    <div class="modal-buttons">
      <button class="clear-history-modal" id="clearHistoryModalBtn">Limpar tudo</button>
    </div>
    <div class="history-list-modal" id="historyListModal">
      <div class="empty-modal">Nenhum cálculo ainda.<br>Pressione "=" para registrar</div>
    </div>
  </div>
</div>

<!-- Botão full screen extra (navegador) -->
<button class="fullscreen-btn" id="fullscreenToggleBtn" title="Tela cheia">⛶</button>

<div id="errorToast" class="error-toast">⚠️ Operação inválida</div>

<script>
  // ======================== HISTÓRICO (ARRAY + STORAGE) ========================
  let calculationHistory = [];

  function loadHistoryFromStorage() {
    const stored = localStorage.getItem("calc_history_pro_v2");
    if (stored) {
      try {
        calculationHistory = JSON.parse(stored);
        if (!Array.isArray(calculationHistory)) calculationHistory = [];
      } catch(e) { calculationHistory = []; }
    }
    renderHistoryModal();
  }

  function saveHistoryToStorage() {
    localStorage.setItem("calc_history_pro_v2", JSON.stringify(calculationHistory.slice(0, 25)));
  }

  function addHistoryEntry(expression, result) {
    if (!expression || expression.trim() === "") return;
    calculationHistory.unshift({ expr: expression, result: result.toString() });
    if (calculationHistory.length > 25) calculationHistory.pop();
    renderHistoryModal();
    saveHistoryToStorage();
  }

  function clearHistory() {
    calculationHistory = [];
    renderHistoryModal();
    saveHistoryToStorage();
    showToast("🧹 Histórico limpo", 1300);
  }

  function renderHistoryModal() {
    const container = document.getElementById("historyListModal");
    if (!container) return;
    
    if (calculationHistory.length === 0) {
      container.innerHTML = `<div class="empty-modal">✨ Nenhum cálculo ainda<br>Insira uma expressão e clique =</div>`;
      return;
    }
    
    let html = "";
    for (let i = 0; i < calculationHistory.length; i++) {
      const entry = calculationHistory[i];
      html += `
        <div class="history-item-modal" onclick="reuseCalculation('${escapeHtmlForAttr(entry.expr)}')">
          <div class="history-expr-modal">${escapeHtml(entry.expr)}</div>
          <div class="history-result-modal">= ${escapeHtml(entry.result)}</div>
        </div>
      `;
    }
    container.innerHTML = html;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  function escapeHtmlForAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/['"]/g, '&#39;');
  }

  function reuseCalculation(expr) {
    const display = document.getElementById("display");
    if (display) {
      display.value = expr;
      closeModal();
      showToast("📐 Expressão carregada", 1000);
    }
  }

  // ======================== MODAL CONTROLE ========================
  const modal = document.getElementById("historyModal");
  const openBtn = document.getElementById("openHistoryBtn");
  const closeBtn = document.getElementById("closeModalBtn");
  const clearModalBtn = document.getElementById("clearHistoryModalBtn");

  function openModal() {
    if (modal) {
      modal.classList.add("active");
      renderHistoryModal();
    }
  }
  function closeModal() {
    if (modal) modal.classList.remove("active");
  }

  openBtn?.addEventListener("click", openModal);
  closeBtn?.addEventListener("click", closeModal);
  clearModalBtn?.addEventListener("click", () => {
    clearHistory();
    showToast("🗑️ Histórico apagado", 1000);
  });
  modal?.addEventListener("click", (e) => {
    if (e.target === modal) closeModal();
  });

  // ======================== FUNÇÕES DA CALCULADORA ========================
  function append(value) {
    const display = document.getElementById("display");
    let current = display.value;
    const operators = ['+', '-', '*', '/'];
    const lastChar = current.slice(-1);
    if (operators.includes(value) && operators.includes(lastChar)) {
      display.value = current.slice(0, -1) + value;
      return;
    }
    if (value === '.') {
      let parts = current.split(/[\+\-\*\/]/);
      let lastPart = parts[parts.length - 1];
      if (lastPart.includes('.')) return;
    }
    display.value += value;
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function deleteLast() {
    const display = document.getElementById("display");
    display.value = display.value.slice(0, -1);
  }

  function appendPercentage() {
    const display = document.getElementById("display");
    let expr = display.value;
    if (expr === "") {
      append("0%");
      return;
    }
    let tokenMatch = expr.match(/(\d+(?:\.\d+)?)(?!.*\d)/);
    if (tokenMatch) {
      let lastNumber = tokenMatch[1];
      let percentValue = parseFloat(lastNumber) / 100;
      let newExpr = expr.slice(0, tokenMatch.index) + percentValue.toString();
      display.value = newExpr;
    } else {
      append("%");
    }
  }

  function showToast(message, duration = 1700) {
    const toast = document.getElementById("errorToast");
    if (!toast) return;
    toast.textContent = message;
    toast.style.opacity = "1";
    setTimeout(() => {
      toast.style.opacity = "0";
    }, duration);
  }

  function calculate() {
    const display = document.getElementById("display");
    let rawExpr = display.value.trim();
    if (rawExpr === "") {
      showToast("📝 Insira uma expressão", 1200);
      return;
    }
    
    let sanitized = rawExpr.replace(/÷/g, '/').replace(/×/g, '*').replace(/%/g, '/100');
    if (/[\+\-\*\/]{2,}/.test(sanitized)) {
      showToast("❌ Operadores consecutivos inválidos", 1400);
      return;
    }
    
    try {
      const calcFunc = new Function('return (' + sanitized + ')');
      let result = calcFunc();
      
      if (typeof result !== 'number' || isNaN(result) || !isFinite(result)) {
        throw new Error("Resultado inválido");
      }
      
      let rounded = parseFloat(result.toFixed(10));
      let finalResult = Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toString();
      
      display.value = finalResult;
      let prettyExpr = rawExpr.replace(/\//g, '÷').replace(/\*/g, '×').replace(/\/100/g, '%');
      addHistoryEntry(prettyExpr, finalResult);
      
    } catch (error) {
      showToast("⚠️ Expressão inválida", 1500);
      display.style.border = "1px solid #ff7755";
      setTimeout(() => {
        display.style.border = "none";
        display.style.boxShadow = "inset 0 4px 12px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05)";
      }, 700);
    }
  }

  // ======================== SUPORTE TECLADO ========================
  function handleKeyboard(e) {
    const key = e.key;
    const validNums = /[\d\.]/;
    const ops = ['+', '-', '*', '/'];
    if (validNums.test(key) || ops.includes(key)) {
      e.preventDefault();
      let mapped = key;
      if (key === '*') mapped = '*';
      if (key === '/') mapped = '/';
      append(mapped);
    } else if (key === 'Enter') {
      e.preventDefault();
      calculate();
    } else if (key === 'Escape') {
      e.preventDefault();
      clearDisplay();
    } else if (key === 'Backspace') {
      e.preventDefault();
      deleteLast();
    } else if (key === '%') {
      e.preventDefault();
      appendPercentage();
    } else if (key === 'h' || key === 'H') {
      e.preventDefault();
      openModal();
    }
  }

  // ======================== BOTÃO FULLSCREEN (NATIVO) ========================
  const fullscreenBtn = document.getElementById('fullscreenToggleBtn');
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        showToast(`Erro fullscreen: ${err.message}`, 1500);
      });
    } else {
      document.exitFullscreen();
    }
  }
  if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    // Ícone muda opcionalmente
    document.addEventListener('fullscreenchange', () => {

  function createParticles() {
    const container = document.getElementById("particlesContainer");
    if (!container) return;
    const particleCount = 70;
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement("div");
      particle.classList.add("particle");
      const size = Math.random() * 7 + 2;
      particle.style.width = size + "px";
      particle.style.height = size + "px";
      particle.style.left = Math.random() * 100 + "%";
      particle.style.animationDuration = Math.random() * 18 + 8 + "s";
      particle.style.animationDelay = Math.random() * 20 + "s";
      particle.style.opacity = Math.random() * 0.45 + 0.05;
      container.appendChild(particle);
    }
  }
